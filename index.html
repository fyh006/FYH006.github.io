<!DOCTYPE html>

<head>

    <title>数据分析课程作业 | 学生压力预测</title>
    <style>
        body {
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px;
            font-family: "Microsoft YaHei",sans-serif;
            background:#f7f9fc;
        }
        h1,h2{color:#223355;}
        .box{
            background:#fff;
            padding:20px;
            border-radius:10px;
            margin-bottom:25px;
            box-shadow:0 1px 6px #ddd;
        }
        img{
            width:90%;
            margin:10px auto;
            display:block;
            border:1px #eee solid;
            border-radius:6px;
        }
        a{
            color:#0066cc;
            font-size:18px;
        }

<body>
    <div class="box">
        <h1>课程数据分析作业展示</h1>
        <p>姓名：方一航 &nbsp;&nbsp; 学号：2410306217</p>
        <p>数据集：student_stress_sleep_screen 学生睡眠、屏幕时长与压力数据</p>
        <p>完整分析PDF报告：<a href="课程报告.pdf">点击下载</a></p>
    </div>

    <div class="box">
        <h2>1 特征相关性热力图</h2>
        <img src="corr_heatmap.png" alt="相关性热力图">

    <div class="box">

        <img src="stress_pie.png" alt="压力分布饼图">
    </div>

    <div class="box">
        <h2>4 随机森林模型混淆矩阵</h2>
        <img src="confusion_matrix.png" alt="混淆矩阵">
    </div>

    <div class="box">
        <h2>5 特征重要性排序</h2>
        <img src="feature_importance.png" alt="特征重要性">
        <p>屏幕时长、睡眠时间是预测压力的两大核心特征</p>
    </div>
